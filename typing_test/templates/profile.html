<!DOCTYPE html>
<html>
<head>

<title>Profile Details</title>

<style>

body{
font-family:Arial;
background:#f1f1f1;
margin:0;
}

.topbar{
background:#2f5f96;
height:60px;
color:white;
padding:15px;
font-size:20px;
}

.box{
width:500px;
margin:80px auto;
background:white;
box-shadow:0 0 10px #888;
}

.header{
background:#2f5f96;
color:white;
padding:10px;
text-align:center;
font-weight:bold;
}

.content{
padding:20px;
}

/* 🔥 PERFECT ALIGNMENT */
.row{
display:grid;
grid-template-columns: 220px 20px 1fr;
padding:8px 0;
border-bottom:1px solid #ddd;
align-items:center;
}

.label{
font-weight:bold;
text-align:left;
}

.colon{
text-align:center;
}

.value{
text-align:left;
}

button{
padding:8px 20px;
background:#2f5f96;
color:white;
border:none;
cursor:pointer;
margin-top:15px;
}

</style>

</head>

<body>

<div class="topbar">
Profile Details
</div>

<center>
<img src="{{ url_for('static', filename='logo.png') }}" height="90">
</center>

<div class="box">

<div class="header">
CANDIDATE PROFILE DETAILS - <span style="color:yellow;">TYPING</span>
</div>

<div class="content">

<div class="row">
<span class="label">Registration No</span>
<span class="colon">:</span>
<span class="value">{{student[0]}}</span>
</div>

<div class="row">
<span class="label">Candidate Name</span>
<span class="colon">:</span>
<span class="value">{{student[1]}}</span>
</div>

<div class="row">
<span class="label">Date of Birth</span>
<span class="colon">:</span>
<span class="value">
{{student[2][:2]}}/{{student[2][2:4]}}/{{student[2][4:]}}
</span>
</div>

<div class="row">
<span class="label">Test Type</span>
<span class="colon">:</span>
<span class="value">English & Hindi</span>
</div>

<center>

<form method="post">
<button>I Confirm To Proceed</button>
</form>

</center>

</div>

</div>

</body>
</html>
