<h2>Test Settings</h2>

<form method="post">

Duration

<input name="duration" value="{{s[0]}}">

<br><br>

Mode

<select name="mode">

<option value="word">Word Based</option>

<option value="stroke">Stroke Based</option>

</select>

<label>
<input type="checkbox" name="highlight" value="1"
{% if s[2] == 1 %}checked{% endif %}>
Enable Highlight
</label>

<br><br>

<button>Save</button>

</form>
