<h2>Paragraphs</h2>

<a href="/add_passage"><button>Add Paragraph</button></a>

<table border="1">

<tr>
<th>ID</th>
<th>Language</th>
<th>Mode</th>
<th>Action</th>
</tr>

{% for p in paras %}

<tr>

<td>{{p[0]}}</td>

<td>{{p[1]}}</td>

<td>{{p[4]}}</td>

<td>

<a href="/activate_para/{{p[0]}}">
<button>Activate</button>
</a>

<a href="/edit_para/{{p[0]}}">
<button>Edit</button>
</a>

<a href="/delete_para/{{p[0]}}">
<button>Delete</button>
</a>

</td>

</tr>

{% endfor %}

</table>
